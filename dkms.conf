PACKAGE_NAME="it5570-fan"
PACKAGE_VERSION="@PKGVER@"
AUTOINSTALL="yes"

BUILT_MODULE_NAME[0]="it5570_fan"
DEST_MODULE_LOCATION[0]="/kernel/drivers/hwmon/"

# Allow caller to override the compiler toolchain. CachyOS ships clang/lld
# as the default kernel toolchain; fall back to whatever the kernel was
# built with on other distros.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build \
    KDIR=${kernel_source_dir} \
    ${CROSS_COMPILE:+CROSS_COMPILE=$CROSS_COMPILE} \
    ${CC:+CC=$CC} \
    ${LD:+LD=$LD} \
    ${LLVM:+LLVM=$LLVM} \
    modules"

CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
