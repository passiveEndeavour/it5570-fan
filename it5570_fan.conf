# /etc/modules-load.d/it5570_fan.conf
# or install to /usr/lib/modules-load.d/it5570_fan.conf via the package
#
# Auto-load the ITE IT5570 fan driver at boot.
# The module performs its own chip detection at init and exits cleanly
# (-ENODEV) on hardware that does not have an IT5570 EC, so loading it
# unconditionally is safe.
it5570_fan
